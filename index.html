<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>対数ものさし路線図</title>
<style>
  :root{
    --ink:#181818; --muted:#71706b; --bg:#ffffff;
    --line-top:#E0512A; --line-bot:#0F9C74;
    --capsule:#15151b; --gold:#E0A100; --gold-soft:#FBEFCB;
    --grid:#EFEEEA; --grid-strong:#E0DED7;
    --panel:#FAF9F6; --border:#E5E3DD;
    --font: "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP","Meiryo",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);}
  .wrap{max-width:1060px;margin:0 auto;padding:22px 18px 44px;}
  header h1{font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:.01em;}
  header h1 .ver{font-size:12px;font-weight:600;color:var(--muted);margin-left:8px;vertical-align:middle;
    border:1px solid var(--border);border-radius:6px;padding:2px 7px;background:var(--panel);}
  header p.sub{margin:0 0 14px;color:var(--muted);font-size:13.5px;line-height:1.6;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .legend span{display:inline-flex;align-items:center;gap:7px;}
  .dotc{width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid var(--line-top);}
  .dotc.bot{border-color:var(--line-bot);}
  .controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:6px 0 12px;}
  .switch{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);cursor:pointer;user-select:none;}
  .switch input{display:none;}
  .switch .track{width:42px;height:24px;border-radius:999px;background:#d9d7d0;position:relative;transition:background .15s;flex:none;}
  .switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .15s;}
  .switch input:checked + .track{background:var(--line-bot);}
  .switch input:checked + .track .knob{left:21px;}
  .seg{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink);}
  .seg .buttons{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
  .seg .buttons button{font-family:var(--font);font-size:13px;padding:7px 13px;border:none;background:#fff;color:var(--ink);cursor:pointer;border-left:1px solid var(--border);}
  .seg .buttons button:first-child{border-left:none;}
  .seg .buttons button.on{background:var(--line-bot);color:#fff;}
  .route{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid var(--border);
    border-radius:12px;background:#fff;padding:12px 14px;margin-top:12px;}
  .route .lbl{font-size:13.5px;color:var(--muted);font-weight:600;}
  .route select{font-family:var(--font);font-size:14px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;}
  .route .arrow{color:var(--muted);font-size:14px;}
  .mapcard{border:1px solid var(--border);border-radius:14px;background:#fff;overflow:hidden;}
  #map{display:block;width:100%;height:auto;touch-action:none;user-select:none;-webkit-user-select:none;}
  .zoom{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;
        border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:14px 16px;}
  .zoom .lbl{font-size:13.5px;color:var(--muted);font-weight:600;}
  .zrange{position:relative;flex:1;min-width:230px;height:36px;}
  .ztrack{position:absolute;top:21px;left:0;right:0;height:6px;border-radius:3px;background:#e7e5df;}
  .zsel{position:absolute;top:18px;height:12px;border-radius:6px;background:var(--line-bot);cursor:grab;touch-action:none;}
  .zthumb{position:absolute;top:13px;width:22px;height:22px;margin-left:-11px;border-radius:50%;
          background:#fff;border:2px solid var(--line-bot);cursor:ew-resize;box-shadow:0 1px 3px rgba(0,0,0,.2);touch-action:none;}
  .zthumb .cap{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap;pointer-events:none;}
  .zoom button{font-family:var(--font);font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;}
  .zoom button:hover{background:#f3f1ec;}
  .panel{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:14px;
         border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:14px 16px;}
  .mag{display:flex;flex-direction:column;gap:2px;min-width:170px;}
  .mag .k{font-size:12px;color:var(--muted);}
  .mag .v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
  .reading{flex:1;min-width:200px;font-size:14px;color:var(--ink);line-height:1.55;}
  .reading .b{color:var(--line-bot);font-weight:700;}
  .reading .t{color:var(--line-top);font-weight:700;}
  .reading .hint{color:var(--muted);}
  button.reset{margin-left:auto;border:1px solid var(--border);background:#fff;color:var(--ink);
    font-family:var(--font);font-size:14px;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:500;}
  button.reset:hover{background:var(--panel);}
  .adder{display:flex;align-items:center;gap:8px;flex-wrap:wrap;border:1px solid var(--border);
    border-radius:12px;background:#fff;padding:12px 14px;margin-top:12px;}
  .adder .lbl{font-size:13.5px;color:var(--muted);font-weight:600;}
  .adder input{font-family:var(--font);font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;}
  .adder input.name{width:130px;} .adder input.size{width:130px;}
  .adder button{font-family:var(--font);font-size:14px;padding:8px 14px;border-radius:8px;border:1px solid var(--line-bot);background:var(--line-bot);color:#fff;cursor:pointer;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;background:var(--gold-soft);border:1px solid #ecdca6;border-radius:999px;padding:4px 6px 4px 12px;}
  .chip button{border:none;background:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:12px;line-height:1;color:#777;}
  .err{color:#c0392b;font-size:13px;}
  .foot{margin-top:12px;color:var(--muted);font-size:12.5px;line-height:1.6;}
  @media (max-width:560px){ header h1{font-size:18px;} .mag .v{font-size:22px;} button.reset{margin-left:0;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>対数ものさし路線図<span class="ver">v1.1</span></h1>
    <p class="sub">原子から宇宙まで、大きさを対数で1本の路線にしました。2本のものさしを比べて、「人が原子サイズだったら宇宙はどれくらい？」を読む道具です。</p>
    <div class="legend">
      <span><i class="dotc"></i>オレンジ＝うごかない ものさし</span>
      <span><i class="dotc bot"></i>みどり＝ドラッグで うごく ものさし</span>
    </div>
    <div class="controls">
      <label class="switch">
        <input type="checkbox" id="emoji">
        <span class="track"><span class="knob"></span></span>
        絵文字を 出す
      </label>
      <span class="seg">むき：
        <span class="buttons">
          <button data-m="auto" class="on">自動</button>
          <button data-m="h">よこ</button>
          <button data-m="v">たて</button>
        </span>
      </span>
    </div>
  </header>

  <div class="route">
    <span class="lbl">路線（始発〜終着）：</span>
    始発 <select id="startSel"></select>
    <span class="arrow">→</span>
    終着 <select id="endSel"></select>
  </div>

  <div class="mapcard">
    <svg id="map" viewBox="0 0 1060 360" role="img" aria-label="対数ものさし2本の路線図"></svg>
  </div>

  <div class="zoom">
    <span class="lbl">部分ズーム（おびを ドラッグで 移動）：</span>
    <div class="zrange" id="zrange">
      <div class="ztrack"></div>
      <div class="zsel" id="zsel"></div>
      <div class="zthumb" id="zlo"><span class="cap" id="zlocap"></span></div>
      <div class="zthumb" id="zhi"><span class="cap" id="zhicap"></span></div>
    </div>
    <button id="zreset">ぜんたい</button>
    <span id="zpresets"></span>
  </div>

  <div class="panel">
    <div class="mag">
      <div class="k">いまの 倍率</div>
      <div class="v" id="mag">×1倍</div>
    </div>
    <div class="reading" id="reading">ものさしを ドラッグ、または 2つの駅を タップして、のりかえ駅で つないでみてください。</div>
    <button class="reset" id="reset">ぴったりに もどす</button>
  </div>

  <div class="adder">
    <span class="lbl">くらべる物を 追加：</span>
    <input class="name" id="addName" type="text" placeholder="なまえ（例：サッカーボール）">
    <input class="size" id="addSize" type="text" placeholder="大きさ メートル">
    <button id="addBtn">追加する</button>
    <span class="err" id="addErr"></span>
    <div class="chips" id="chips"></div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script>
const BASE = [
  {name:'原子',         v:1e-10, e:'⚛️'},
  {name:'コロナウイルス', v:1.2e-7, e:'🦠'},
  {name:'赤血球（ヒト）', v:7.5e-6, e:'🩸'},
  {name:'髪の毛の太さ', v:1e-4,  e:'💇'},
  {name:'クロオオアリ', v:1e-2,  e:'🐜'},
  {name:'人',           v:1.8,   e:'🧍'},
  {name:'シロナガスクジラ', v:30,  e:'🐋'},
  {name:'東京タワー',   v:333,   e:'🗼'},
  {name:'富士山',       v:3776,  e:'🗻'},
  {name:'地球',         v:1.3e7, e:'🌍'},
  {name:'太陽',         v:1.4e9, e:'☀️'},
  {name:'太陽系',       v:9e12,  e:'🪐'},
  {name:'1光年',        v:9.5e15,e:'🌟'},
  {name:'銀河系',       v:1e21,  e:'🌌'},
  {name:'観測できる宇宙', v:8.8e26, e:'🌠'},
];
let custom=[]; let STATIONS=BASE.concat(custom); let showEmoji=false;
let bubble=null; // タップで出す ふきだし {bar:'A'|'B', i}

const SVGNS='http://www.w3.org/2000/svg';
const svg=document.getElementById('map');
const magEl=document.getElementById('reading');
const magVal=document.getElementById('mag');
const footEl=document.getElementById('foot');

const HW=1060, HH=360, hPadL=66, hPadR=110, TOPY=170, BOTY=210;
const ANG=44, COS=Math.cos(ANG*Math.PI/180), SIN=Math.sin(ANG*Math.PI/180);
const VW=440, VH=820, vPadT=40, vPadB=52, LEFTX=170, RIGHTX=270;
const LOGMIN=-10.6, LOGMAX=27.5, RANGE=LOGMAX-LOGMIN;
const ALIGN_TOL=5.5, OVERLAP_EPS=0.004, MINWIN=0.03;

let shift=0, selA=null, selB=null;
let orientMode='auto', orient='h';
let viewLo=0, viewHi=1; // 表示する pos はんい（ズーム）

function isV(){return orient==='v';}
function log10(x){return Math.log(x)/Math.LN10;}
function pos(v){return (log10(v)-LOGMIN)/RANGE;}
function dims(){ return isV()? {pad:vPadT, usable:VH-vPadT-vPadB} : {pad:hPadL, usable:HW-hPadL-hPadR}; }
function frac(p){ return (p-viewLo)/(viewHi-viewLo); }
function mainPx(p){ const d=dims(); return d.pad + frac(p)*d.usable; }
function vis(p){ const f=frac(p); return f>=-0.04 && f<=1.04; }
function coordA(i){ const m=mainPx(pos(STATIONS[i].v));       return isV()? {x:LEFTX,y:m}:{x:m,y:TOPY}; }
function coordB(i){ const m=mainPx(pos(STATIONS[i].v)+shift); return isV()? {x:RIGHTX,y:m}:{x:m,y:BOTY}; }
function mainOf(c){ return isV()? c.y : c.x; }
function clamp(s){return Math.max(-1.18,Math.min(1.18,s));}
function mag(){return Math.pow(10, shift*RANGE);}
function label(i){return STATIONS[i].name + (showEmoji && STATIONS[i].e? ' '+STATIONS[i].e : '');}

const SUP={'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
function sup(n){return String(n).split('').map(c=>SUP[c]||c).join('');}
function fmtVal(v){
  if(v>=0.001 && v<10000){ let s=v>=100? Math.round(v).toString() : (v>=1? trimz(v.toPrecision(2)) : trimz(v.toPrecision(1))); return s+' m'; }
  const e=Math.floor(log10(v)); const mant=v/Math.pow(10,e); const ms=Math.round(mant*10)/10;
  return (ms===1?'':ms+'×')+'10'+sup(e)+' m';
}
function trimz(s){return s.replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1');}
const UNITS=['','万','億','兆','京','垓','秭','穣','溝','澗','正','載','極','恒河沙','阿僧祇','那由他','不可思議','無量大数'];
function jpBig(n){
  if(n<1) return n.toPrecision(2);
  let idx=Math.floor(log10(n)/4); if(idx<0) idx=0;
  if(idx>=UNITS.length){ const e=Math.floor(log10(n)); const m=n/Math.pow(10,e); return (Math.round(m*10)/10)+'×10'+sup(e); }
  let m=n/Math.pow(10,idx*4);
  let ms=m>=100? Math.round(m).toString() : trimz((Math.round(m*100)/100).toString());
  return ms+UNITS[idx];
}
function fmtMag(m){ if(Math.abs(m-1)<1e-9) return '×1倍'; if(m>=1) return '×'+jpBig(m)+'倍'; return '×'+jpBig(1/m)+'分の1'; }
function el(tag,attrs){ const e=document.createElementNS(SVGNS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

function assignLanes(visIdx){
  const order=visIdx.slice().sort((a,b)=>coordA(a).x-coordA(b).x);
  const laneEnd=[]; const lev={};
  for(const i of order){
    const v=label(i).length + (showEmoji && STATIONS[i].e?0.6:0);
    const spanH=v*15*COS; const x=coordA(i).x;
    let l=0; while(l<laneEnd.length && laneEnd[l]+6>x) l++;
    if(l===laneEnd.length) laneEnd.push(0);
    lev[i]=l; laneEnd[l]=x+spanH;
  }
  return lev;
}

function drawStation(bar,i,lit,sel,level){
  const g=el('g',{});
  const c = bar==='A'? coordA(i):coordB(i);
  const color = bar==='A'? 'var(--line-top)':'var(--line-bot)';
  if(isV()){
    const tx=bar==='A'? c.x-14:c.x+14, anchor=bar==='A'?'end':'start';
    const t=el('text',{x:tx,y:c.y+5,'text-anchor':anchor,'font-family':'var(--font)','font-size':13,
      fill: lit?'var(--gold)':'var(--ink)','font-weight':lit?700:400});
    t.textContent=label(i); g.appendChild(t);
  } else {
    const uy=(bar==='A'?-SIN:SIN), dist=18+level*30, lx=c.x+COS*dist, ly=c.y+uy*dist;
    g.appendChild(el('line',{x1:c.x+COS*9,y1:c.y+uy*9,x2:lx,y2:ly,stroke:'var(--muted)','stroke-width':0.6,opacity:0.5}));
    const t=el('text',{x:lx,y:ly,'text-anchor':'start',transform:'rotate('+(bar==='A'?-ANG:ANG)+' '+lx+' '+ly+')',
      'font-family':'var(--font)','font-size':15, fill: lit?'var(--gold)':'var(--ink)','font-weight':lit?700:400});
    t.textContent=label(i); g.appendChild(t);
  }
  const r=sel?9.5:7.5;
  const cc=el('circle',{cx:c.x,cy:c.y,r:r,fill:'#fff',stroke: sel?'var(--gold)':color,'stroke-width': sel?4:3.4});
  const title=el('title',{}); title.textContent=STATIONS[i].name+'：'+fmtVal(STATIONS[i].v);
  cc.appendChild(title); g.appendChild(cc);
  return g;
}

function render(){
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  const V=isV(); const W=V?VW:HW, H=V?VH:HH;

  // けたの目もり（はんい内のみ）
  const grid=el('g',{});
  for(let e=-10;e<=26;e+=2){
    const p=(e-LOGMIN)/RANGE; if(!vis(p)) continue;
    const gp=mainPx(p); const labeled=(e%10===0);
    if(V){
      grid.appendChild(el('line',{x1:30,y1:gp,x2:W-12,y2:gp,stroke:labeled?'var(--grid-strong)':'var(--grid)','stroke-width':labeled?1:0.8}));
      if(labeled){ const gl=el('text',{x:20,y:gp+4,'text-anchor':'start','font-size':11,fill:'var(--muted)','font-family':'var(--font)'}); gl.textContent='10'+sup(e); grid.appendChild(gl); }
    } else {
      grid.appendChild(el('line',{x1:gp,y1:34,x2:gp,y2:H-40,stroke:labeled?'var(--grid-strong)':'var(--grid)','stroke-width':labeled?1:0.8}));
      if(labeled){ const gl=el('text',{x:gp,y:20,'text-anchor':'middle','font-size':11.5,fill:'var(--muted)','font-family':'var(--font)'}); gl.textContent='10'+sup(e); grid.appendChild(gl); }
    }
  }
  svg.appendChild(grid);

  // レール（表示エリアいっぱい：見える駅は必ず線の上に乗る）
  const d0=dims(), mS=d0.pad-0.05*d0.usable, mE=d0.pad+1.05*d0.usable;
  if(V){
    svg.appendChild(el('line',{x1:LEFTX,y1:mS,x2:LEFTX,y2:mE,stroke:'var(--line-top)','stroke-width':6,'stroke-linecap':'round'}));
    svg.appendChild(el('line',{x1:RIGHTX,y1:mS,x2:RIGHTX,y2:mE,stroke:'var(--line-bot)','stroke-width':6,'stroke-linecap':'round'}));
  } else {
    svg.appendChild(el('line',{x1:mS,y1:TOPY,x2:mE,y2:TOPY,stroke:'var(--line-top)','stroke-width':6,'stroke-linecap':'round'}));
    svg.appendChild(el('line',{x1:mS,y1:BOTY,x2:mE,y2:BOTY,stroke:'var(--line-bot)','stroke-width':6,'stroke-linecap':'round'}));
  }

  // 見える駅
  const visA=[], visB=[];
  for(let i=0;i<STATIONS.length;i++){ if(vis(pos(STATIONS[i].v))) visA.push(i); if(vis(pos(STATIONS[i].v)+shift)) visB.push(i); }

  // のりかえ判定（見える駅どうし）
  const overlap=Math.abs(shift)<OVERLAP_EPS;
  const litA=new Set(), litB=new Set(); const pairs=[];
  if(!overlap){
    for(const i of visA){ const ma=mainOf(coordA(i));
      for(const j of visB){ if(Math.abs(ma-mainOf(coordB(j)))<ALIGN_TOL){ pairs.push({i,j,m:(ma+mainOf(coordB(j)))/2}); litA.add(i); litB.add(j); } }
    }
  }

  // カプセル
  const caps=el('g',{});
  pairs.forEach(p=>{
    if(V){
      caps.appendChild(el('rect',{x:LEFTX-11,y:p.m-11,width:(RIGHTX-LEFTX)+22,height:22,rx:11,fill:'#fff',stroke:'var(--capsule)','stroke-width':2.6}));
      caps.appendChild(el('line',{x1:LEFTX,y1:p.m-12,x2:LEFTX,y2:p.m+12,stroke:'var(--line-top)','stroke-width':6}));
      caps.appendChild(el('line',{x1:RIGHTX,y1:p.m-12,x2:RIGHTX,y2:p.m+12,stroke:'var(--line-bot)','stroke-width':6}));
    } else {
      caps.appendChild(el('rect',{x:p.m-11,y:TOPY-11,width:22,height:(BOTY-TOPY)+22,rx:11,fill:'#fff',stroke:'var(--capsule)','stroke-width':2.6}));
      caps.appendChild(el('line',{x1:p.m-12,y1:TOPY,x2:p.m+12,y2:TOPY,stroke:'var(--line-top)','stroke-width':6}));
      caps.appendChild(el('line',{x1:p.m-12,y1:BOTY,x2:p.m+12,y2:BOTY,stroke:'var(--line-bot)','stroke-width':6}));
    }
  });
  svg.appendChild(caps);

  // 駅
  const lev = V? {} : assignLanes(visA);
  for(const i of visB) svg.appendChild(drawStation('B',i,litB.has(i),selB===i, V?0:(lev[i]||0)));
  for(const i of visA) svg.appendChild(drawStation('A',i,litA.has(i),selA===i, V?0:(lev[i]||0)));

  // ふきだし（タップした駅の 名前＋大きさ）
  drawBubble(V,W,H);

  // 読み取り
  const nA=isV()?'左':'上', nB=isV()?'右':'下';
  magVal.textContent= overlap? '×1倍' : fmtMag(mag());
  if(overlap){
    magEl.innerHTML='いまは <b>ぴったり重なり</b>（×1倍）。ものさしを ドラッグするか、駅をタップして ずらしてみてください。';
  } else if(pairs.length){
    const p=pairs[0], a=STATIONS[p.i], b=STATIONS[p.j];
    magEl.innerHTML='のりかえ駅：'+nA+'の<span class="t">'+a.name+'</span>（'+fmtVal(a.v)+'） ＝ '+nB+'の<span class="b">'+b.name+'</span>（'+fmtVal(b.v)+'）'
      +(pairs.length>1?' <span class="hint">ほか'+(pairs.length-1)+'駅も光っています</span>':'');
  } else if(selA!==null){ magEl.innerHTML=nA+'の<span class="t">'+STATIONS[selA].name+'</span>を えらびました。つぎに '+nB+'の駅をタップしてください。';
  } else if(selB!==null){ magEl.innerHTML=nB+'の<span class="b">'+STATIONS[selB].name+'</span>を えらびました。つぎに '+nA+'の駅をタップしてください。';
  } else { magEl.innerHTML='ずらし中… 駅が そろうと のりかえ駅で光ります。'; }
}

// ふきだし
function drawBubble(V,W,H){
  if(!bubble) return;
  const i=bubble.i; if(i==null || !STATIONS[i]) { bubble=null; return; }
  const st=STATIONS[i];
  const p = bubble.bar==='A' ? pos(st.v) : pos(st.v)+shift;
  if(!vis(p)) return;
  const c = bubble.bar==='A' ? coordA(i) : coordB(i);
  const size = fmtVal(st.v);
  const boxW = Math.max(st.name.length*15, size.length*8.5) + 28;
  const boxH = 50;
  let bx, by, tri;
  if(V){
    bx = bubble.bar==='A' ? c.x+16 : c.x-16-boxW;
    by = Math.max(4, Math.min(H-boxH-4, c.y-boxH/2));
    bx = Math.max(4, Math.min(W-boxW-4, bx));
    const ty = Math.max(by+12, Math.min(by+boxH-12, c.y));
    tri = bubble.bar==='A'
      ? bx+','+(ty-7)+' '+bx+','+(ty+7)+' '+(bx-10)+','+ty
      : (bx+boxW)+','+(ty-7)+' '+(bx+boxW)+','+(ty+7)+' '+(bx+boxW+10)+','+ty;
  } else {
    bx = Math.max(4, Math.min(W-boxW-4, c.x-boxW/2));
    const above = (c.y-16-boxH) >= 4;
    by = above ? c.y-16-boxH : c.y+16;
    const tx = Math.max(bx+12, Math.min(bx+boxW-12, c.x));
    tri = above
      ? (tx-7)+','+(by+boxH)+' '+(tx+7)+','+(by+boxH)+' '+tx+','+(by+boxH+10)
      : (tx-7)+','+by+' '+(tx+7)+','+by+' '+tx+','+(by-10);
  }
  const g=el('g',{});
  g.appendChild(el('polygon',{points:tri,fill:'var(--capsule)'}));
  g.appendChild(el('rect',{x:bx,y:by,width:boxW,height:boxH,rx:10,fill:'var(--capsule)'}));
  const t1=el('text',{x:bx+boxW/2,y:by+21,'text-anchor':'middle','font-size':15,'font-weight':700,fill:'#fff','font-family':'var(--font)'}); t1.textContent=st.name; g.appendChild(t1);
  const t2=el('text',{x:bx+boxW/2,y:by+39,'text-anchor':'middle','font-size':13,fill:'#cfe6dd','font-family':'var(--font)'}); t2.textContent=size; g.appendChild(t2);
  svg.appendChild(g);
}

// むき
function computeOrient(){ orient = orientMode!=='auto' ? orientMode : (window.innerWidth<=640?'v':'h'); }
function applyViewBox(){ svg.setAttribute('viewBox', isV()? ('0 0 '+VW+' '+VH) : ('0 0 '+HW+' '+HH)); }
function updateFoot(){
  footEl.innerHTML = isV()
    ? '操作：右（みどり）を ドラッグ＝くらべる（ずらす）。左（オレンジ）を ドラッグ＝見る位置を 移動（2本いっしょ・要ズーム）。駅タップで のりかえ。スマホは タップ／おびドラッグが べんり。'
    : '操作：下（みどり）を ドラッグ＝くらべる（ずらす）。上（オレンジ）を ドラッグ＝見る位置を 移動（2本いっしょ・要ズーム）。駅タップで のりかえ。';
}
function refresh(){ computeOrient(); applyViewBox(); updateFoot(); render(); }

// アニメ
let raf=null;
function animateTo(target){
  if(raf) cancelAnimationFrame(raf);
  const start=shift, dur=360, t0=performance.now();
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){ shift=clamp(target); render(); return; }
  function step(now){ const k=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-k,3); shift=clamp(start+(target-start)*e); render(); if(k<1) raf=requestAnimationFrame(step); }
  raf=requestAnimationFrame(step);
}

// 操作（路線図）
function vbPoint(ev){ const pt=svg.createSVGPoint(); pt.x=ev.clientX; pt.y=ev.clientY; return pt.matrixTransform(svg.getScreenCTM().inverse()); }
function hitTest(p){
  let best=null, bd=22;
  for(let i=0;i<STATIONS.length;i++){
    if(vis(pos(STATIONS[i].v))){ const a=coordA(i); let d=Math.hypot(p.x-a.x,p.y-a.y); if(d<bd){bd=d;best={bar:'A',i};} }
    if(vis(pos(STATIONS[i].v)+shift)){ const b=coordB(i); let d=Math.hypot(p.x-b.x,p.y-b.y); if(d<bd){bd=d;best={bar:'B',i};} }
  }
  return best;
}
function movableRegion(p){ return isV()? (p.x>=(LEFTX+RIGHTX)/2) : (p.y>=(TOPY+BOTY)/2); }
function selectStation(bar,i){
  if(bar==='A') selA=i; else selB=i;
  if(selA!==null && selB!==null){ const target=pos(STATIONS[selA].v)-pos(STATIONS[selB].v); selA=null; selB=null; animateTo(target); }
  else render();
}
let mode='none', lastMain=0, downP=null, downStation=null, moved=false;
svg.addEventListener('pointerdown',ev=>{
  const p=vbPoint(ev); downP=p; moved=false; downStation=hitTest(p);
  if(downStation) mode = downStation.bar==='B' ? 'dragB' : 'panA';
  else mode = movableRegion(p) ? 'dragB' : 'panA';
  lastMain = isV()?p.y:p.x;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  svg.setPointerCapture(ev.pointerId);
});
svg.addEventListener('pointermove',ev=>{
  if(mode==='none') return;
  const p=vbPoint(ev);
  if(Math.abs(p.x-downP.x)>4 || Math.abs(p.y-downP.y)>4) moved=true;
  const cur=isV()?p.y:p.x;
  if(mode==='dragB'){
    shift=clamp(shift+(cur-lastMain)*(viewHi-viewLo)/dims().usable); lastMain=cur; render();
  }else if(mode==='panA'){
    const w=viewHi-viewLo; const dPos=(cur-lastMain)*w/dims().usable;
    let lo=Math.max(0,Math.min(1-w,viewLo-dPos)); viewLo=lo; viewHi=lo+w; lastMain=cur; render();
  }
});
svg.addEventListener('pointerup',ev=>{
  if(!moved){
    if(downStation){
      bubble={bar:downStation.bar, i:downStation.i};
      selectStation(downStation.bar, downStation.i);
    } else {
      bubble=null; render();
    }
  }
  mode='none';
});
svg.addEventListener('pointercancel',()=>{mode='none';});

document.getElementById('reset').addEventListener('click',()=>{ selA=null; selB=null; animateTo(0); });
document.getElementById('emoji').addEventListener('change',e=>{ showEmoji=e.target.checked; render(); });
document.querySelectorAll('.seg .buttons button').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.seg .buttons button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); orientMode=btn.dataset.m; refresh(); });
});
let rT=null;
window.addEventListener('resize',()=>{ if(orientMode!=='auto') return; clearTimeout(rT); rT=setTimeout(()=>{ const before=orient; computeOrient(); if(orient!==before){ applyViewBox(); updateFoot(); render(); } },150); });

// ===== 部分ズーム スライダー =====
const zrange=document.getElementById('zrange'), zsel=document.getElementById('zsel');
const zlo=document.getElementById('zlo'), zhi=document.getElementById('zhi');
const zlocap=document.getElementById('zlocap'), zhicap=document.getElementById('zhicap');
function valAtFrac(f){ return Math.pow(10, LOGMIN+f*RANGE); }
function updateSlider(){
  zlo.style.left=(viewLo*100)+'%'; zhi.style.left=(viewHi*100)+'%';
  zsel.style.left=(viewLo*100)+'%'; zsel.style.width=((viewHi-viewLo)*100)+'%';
  zlocap.textContent=fmtVal(valAtFrac(viewLo)); zhicap.textContent=fmtVal(valAtFrac(viewHi));
}
function setZoom(lo,hi){ viewLo=Math.max(0,Math.min(lo,1)); viewHi=Math.max(0,Math.min(hi,1));
  if(viewHi-viewLo<MINWIN){ viewHi=Math.min(1,viewLo+MINWIN); if(viewHi-viewLo<MINWIN) viewLo=viewHi-MINWIN; }
  updateSlider(); render(); }
function dragThumb(which){
  return ev=>{
    ev.preventDefault();
    const move=e=>{
      const r=zrange.getBoundingClientRect();
      let f=(e.clientX-r.left)/r.width; f=Math.max(0,Math.min(1,f));
      if(which==='lo') setZoom(Math.min(f,viewHi-MINWIN), viewHi);
      else setZoom(viewLo, Math.max(f,viewLo+MINWIN));
    };
    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  };
}
zlo.addEventListener('pointerdown',dragThumb('lo'));
zhi.addEventListener('pointerdown',dragThumb('hi'));
// おびを ドラッグ → ズーム倍率は そのまま、見る場所を スライド
zsel.addEventListener('pointerdown',ev=>{
  ev.preventDefault();
  const r0=zrange.getBoundingClientRect();
  const startF=(ev.clientX-r0.left)/r0.width, w=viewHi-viewLo, startLo=viewLo;
  const move=e=>{
    const r=zrange.getBoundingClientRect();
    let f=(e.clientX-r.left)/r.width;
    let lo=startLo+(f-startF); lo=Math.max(0,Math.min(1-w,lo));
    setZoom(lo,lo+w);
  };
  const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
  window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
});
document.getElementById('zreset').addEventListener('click',()=>{ startName=STATIONS[0].name; endName=STATIONS[STATIONS.length-1].name; populateTermini(); setZoom(0,1); });

// ショートカット
const PRESETS=[['ミクロ',1e-10,5e-3],['みぢか',5e-3,3776],['マクロ',1.3e7,8.8e26]];
const zp=document.getElementById('zpresets');
PRESETS.forEach(pr=>{
  const b=document.createElement('button'); b.textContent=pr[0];
  b.addEventListener('click',()=>{ const lo=pos(pr[1])-0.015, hi=pos(pr[2])+0.015; setZoom(lo,hi); });
  zp.appendChild(b);
});

// ===== 始発駅・終着駅（路線のはんい）=====
const startSel=document.getElementById('startSel'), endSel=document.getElementById('endSel');
let startName=BASE[0].name, endName=BASE[BASE.length-1].name;
function vByName(n){ const s=STATIONS.find(x=>x.name===n); return s? s.v : null; }
function populateTermini(){
  const names=STATIONS.map(s=>s.name);
  if(!names.includes(startName)) startName=names[0];
  if(!names.includes(endName)) endName=names[names.length-1];
  startSel.innerHTML=''; endSel.innerHTML='';
  STATIONS.forEach(s=>{
    const o1=document.createElement('option'); o1.value=s.name; o1.textContent=s.name; startSel.appendChild(o1);
    const o2=document.createElement('option'); o2.value=s.name; o2.textContent=s.name; endSel.appendChild(o2);
  });
  startSel.value=startName; endSel.value=endName;
}
function setRouteRange(){
  const vs=vByName(startName), ve=vByName(endName);
  if(vs===null||ve===null) return;
  let lo=pos(vs), hi=pos(ve); if(lo>hi){ const t=lo; lo=hi; hi=t; }
  setZoom(lo-0.02, hi+0.02);
}
startSel.addEventListener('change',()=>{ startName=startSel.value; setRouteRange(); });
endSel.addEventListener('change',()=>{ endName=endSel.value; setRouteRange(); });

// 追加
const chipsEl=document.getElementById('chips'), errEl=document.getElementById('addErr');
function rebuild(){ STATIONS=BASE.concat(custom); selA=null; selB=null; populateTermini(); renderChips(); render(); }
function renderChips(){
  chipsEl.innerHTML='';
  custom.forEach((c,idx)=>{
    const chip=document.createElement('span'); chip.className='chip'; chip.textContent=c.name+'（'+fmtVal(c.v)+'）';
    const b=document.createElement('button'); b.textContent='×'; b.title='けす';
    b.addEventListener('click',()=>{ custom.splice(idx,1); rebuild(); });
    chip.appendChild(b); chipsEl.appendChild(chip);
  });
}
function parseSize(s){
  s=(s||'').trim().replace(/[,，\s]/g,'').replace(/[ｍmＭ](eter|ｅｔｅｒ)?$/i,'');
  s=s.replace(/×10\^?/,'e').replace(/\*10\^?/,'e').replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹⁻]/g,m=>({'⁻':'-','⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9'}[m]||m));
  const n=Number(s); return (isFinite(n)&&n>0)? n : null;
}
document.getElementById('addBtn').addEventListener('click',()=>{
  const name=document.getElementById('addName').value.trim();
  const v=parseSize(document.getElementById('addSize').value);
  if(!name){ errEl.textContent='なまえを 入れてね'; return; }
  if(v===null){ errEl.textContent='大きさは メートルの 正の数で（例：1.8 や 1.4e9）'; return; }
  errEl.textContent=''; custom.push({name, v, e:'📍'});
  document.getElementById('addName').value=''; document.getElementById('addSize').value=''; rebuild();
});
document.getElementById('addSize').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('addBtn').click(); });

updateSlider(); populateTermini(); refresh(); renderChips();
</script>
